<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="O99vqo43SmcnpBMVxvFCpwa9_1WWM-Tc7jMqpkrs6AY" />
    <link rel="icon" type="image/svg+xml" href="/ratemysite-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RateMySite is a community gallery for rating website design, sharing site feedback, discovering design inspiration, and improving landing pages, portfolios, SaaS sites, dashboards, blogs, and ecommerce experiences."
    />
    <meta
      name="keywords"
      content="rate my site, website rating, site design, rate website design, website feedback, design inspiration, landing page review, portfolio review, SaaS website design, ecommerce website design, dashboard design, web design gallery"
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0d0e14" />
    <link rel="canonical" href="https://rate-my-site.netlify.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RateMySite" />
    <meta property="og:title" content="RateMySite - Rate Website Design and Get Feedback" />
    <meta
      property="og:description"
      content="Submit a website, rate site design, browse community feedback, and discover web design inspiration across portfolios, SaaS, landing pages, ecommerce, blogs, and dashboards."
    />
    <meta property="og:url" content="https://rate-my-site.netlify.app/" />
    <meta property="og:image" content="https://rate-my-site.netlify.app/ratemysite-logo-light.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RateMySite - Rate Website Design and Get Feedback" />
    <meta
      name="twitter:description"
      content="A community website rating gallery for site design feedback, reviews, and inspiration."
    />
    <meta name="twitter:image" content="https://rate-my-site.netlify.app/ratemysite-logo-light.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "RateMySite",
        "url": "https://rate-my-site.netlify.app/",
        "description": "RateMySite is a community gallery for rating website design, sharing site feedback, and discovering web design inspiration.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://rate-my-site.netlify.app/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "RateMySite",
        "url": "https://rate-my-site.netlify.app/",
        "logo": "https://rate-my-site.netlify.app/ratemysite-icon.svg"
      }
    </script>
    <title>RateMySite - Rate Website Design and Get Feedback</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
