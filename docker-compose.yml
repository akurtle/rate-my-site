version: "3.9"

services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    depends_on:
      - redis

  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:80"
    depends_on:
      - api

  redis:
    image: redis:7
    ports:
      - "6379:6379"
